suite: sandbox service account
templates:
  - templates/serviceaccount.yaml
release:
  name: openshell
  namespace: my-namespace

tests:
  - it: creates gateway and sandbox service accounts by default
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: openshell
        documentIndex: 0
      - equal:
          path: metadata.name
          value: openshell-sandbox
        documentIndex: 1

  - it: uses the configured existing sandbox service account name
    set:
      sandboxServiceAccount.create: false
      sandboxServiceAccount.name: precreated-sandbox
    asserts:
      - hasDocuments:
          count: 1
