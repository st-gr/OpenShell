{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openshell.fullname" . }}-db
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-url: {{ include "openshell.dbUrl" . | quote }}
{{- end }}
