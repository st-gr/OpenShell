# CI lint target: TLS disabled (plaintext HTTP, no client cert requirement).
# Typical when a reverse proxy or tunnel terminates TLS at the edge.
server:
  disableTls: true
  disableGatewayAuth: true
pkiInitJob:
  enabled: false
