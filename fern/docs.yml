# Fern site config — merged with skills/convert-to-fern/assets/theme/nvidia/docs-theme.yml pattern
# Production: https://docs.nvidia.com/openshell/ — preview + custom-domain share path prefix `openshell`.
# Internal MDX links use /latest/...; basepath-aware resolves them under /openshell/ on production.
instances:
  - url: openshell.docs.buildwithfern.com/openshell
    custom-domain: docs.nvidia.com/openshell

title: NVIDIA OpenShell

announcement:
  message: "🔔 NVIDIA OpenShell is <strong>alpha software</strong>. APIs and behavior may change without notice. Do not use in production."

footer: ./components/CustomFooter.tsx

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

colors:
  accentPrimary:
    dark: "#76B900"
    light: "#76B900"
  background:
    light: "#FFFFFF"
    dark: "#000000"

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /openshell/latest
  right-text: OpenShell

favicon: ./assets/NVIDIA_symbol.svg

js:
  - url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
    strategy: beforeInteractive

css:
  - ./main.css

navbar-links:
  - type: github
    value: https://github.com/NVIDIA/OpenShell

experimental:
  mdx-components:
    - ./components
  basepath-aware: true

versions:
  - display-name: Latest
    path: versions/latest.yml
    slug: latest

redirects:
  # Paths are relative to the site root; subpath prefix matches instances + custom-domain.
  # https://www.buildwithfern.com/learn/docs/configuration/site-level-settings#redirects-configuration
  - source: "/openshell/index.html"
    destination: "/openshell/latest"
  - source: "/openshell/index"
    destination: "/openshell/latest"
  - source: "/openshell/observability"
    destination: "/openshell/observability/index"
  - source: "/openshell/latest/:path*/index.html"
    destination: "/openshell/latest/:path*"
  - source: "/openshell/latest/observability"
    destination: "/openshell/latest/observability/index"
  - source: "/openshell/:path*/index.html"
    destination: "/openshell/:path*"
  - source: "/openshell/:path*.html"
    destination: "/openshell/:path*"
