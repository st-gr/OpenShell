# Publishing / release tasks

["publish:main"]
description = "Main branch publish job (images with :dev, :latest, and version tag)"
run = """
#!/usr/bin/env bash
set -euo pipefail
VERSION_DOCKER=$(uv run python tasks/scripts/release.py get-version --docker)
VERSION_PYTHON=$(uv run python tasks/scripts/release.py get-version --python)
CARGO_VERSION=$(uv run python tasks/scripts/release.py get-version --cargo)
IMAGE_TAG=dev TAG_LATEST=true EXTRA_DOCKER_TAGS="$VERSION_DOCKER" mise run build:docker:cluster:multiarch
OPENSHELL_CARGO_VERSION="$CARGO_VERSION" mise run build:python:wheel:multiarch
OPENSHELL_CARGO_VERSION="$CARGO_VERSION" mise run build:python:wheel:macos
uv run python tasks/scripts/release.py python-publish --version "$VERSION_PYTHON"
"""
hide = true

["publish:tag"]
description = "Tag release publish: versioned Docker to ECR and Python to GitHub Packages"
run = """
#!/usr/bin/env bash
set -euo pipefail
VERSION_DOCKER=$(uv run python tasks/scripts/release.py get-version --docker)
VERSION_PYTHON=$(uv run python tasks/scripts/release.py get-version --python)
CARGO_VERSION=$(uv run python tasks/scripts/release.py get-version --cargo)
IMAGE_TAG="$VERSION_DOCKER" TAG_LATEST=false mise run build:docker:cluster:multiarch
OPENSHELL_CARGO_VERSION="$CARGO_VERSION" mise run build:python:wheel:multiarch
OPENSHELL_CARGO_VERSION="$CARGO_VERSION" mise run build:python:wheel:macos
uv run python tasks/scripts/release.py python-publish --version "$VERSION_PYTHON"
"""
hide = true
